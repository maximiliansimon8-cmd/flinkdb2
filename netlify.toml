[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# All redirects are in public/_redirects (copied to dist/ at build time)
# _redirects takes priority over netlify.toml redirects

# ─── Security Headers ───────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent MIME-type sniffing
    X-Content-Type-Options = "nosniff"
    # Prevent clickjacking
    X-Frame-Options = "DENY"
    # Force HTTPS for 1 year (includeSubDomains)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Restrict referrer information
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Disable unnecessary browser features
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"
    # Content Security Policy
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.supabase.co https://*.airtableusercontent.com https://api.mapbox.com https://*.tile.openstreetmap.org; connect-src 'self' https://*.supabase.co https://api.airtable.com https://api.superchat.com https://api.anthropic.com wss://*.supabase.co; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
    # Prevent XSS (legacy header, still useful)
    X-XSS-Protection = "1; mode=block"
