[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback – all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Proxy Airtable API calls through Netlify Function
[[redirects]]
  from = "/api/airtable/*"
  to = "/.netlify/functions/airtable-proxy/:splat"
  status = 200
  force = true
